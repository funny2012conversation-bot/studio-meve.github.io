<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Meve</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@600&display=swap" rel="stylesheet">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background-color: #E0EFFC;
    color: #1A5FA8;
    margin: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .container {
    text-align: center;
    padding: 40px;
  }
  h1 {
    font-family: 'Comfortaa', sans-serif;
    font-weight: 600;
    font-size: 32px;
    margin-bottom: 8px;
  }
  p {
    font-size: 16px;
    color: #3D6FA8;
    margin-bottom: 32px;
  }
  a.app-link {
    display: inline-block;
    background-color: #1A5FA8;
    color: #FFFFFF;
    text-decoration: none;
    padding: 14px 28px;
    border-radius: 8px;
    font-size: 16px;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>StudioMeve</h1>
    <p>個人開発でアプリを制作しています。</p>
    <a class="app-link" href="https://apps.apple.com/jp/app/ワリコ/id6781121631">アプリ「ワリコ」を見る</a>
  </div>
</body>
</html>
